# Fix color issues
set -g default-terminal "tmux-256color"
set -sg terminal-features ",*:RGB"

# Fix Vim ESC delay
set -sg escape-time 0

# Increase scrollback buffer
set -g history-limit 50000

# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# start at 1
set -g base-index 1
setw -g pane-base-index 1

# reload config file (change file location to your the tmux.conf you want to use)
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Enable mouse control (clickable windows, panes, resizable panes)
set -g mouse on

# Put the status bar at the top.
set -g status-position top
set -g status-style fg=colour252,bg=colour235
set -g status-left-length 40
set -g status-right-length 80
set -g status-left '#[fg=colour235,bg=colour148,bold] #S #[fg=colour148,bg=colour235,nobold]'
set -g status-right '#[fg=colour244,bg=colour235]#H #[fg=colour240]• #[fg=colour252]%Y-%m-%d #[fg=colour240]• #[fg=colour252]%H:%M '
setw -g window-status-separator ''
setw -g window-status-format '#[fg=colour244,bg=colour235] #I #[fg=colour247,bg=colour235]#W '
setw -g window-status-current-format '#[fg=colour235,bg=colour39,bold] #I #[fg=colour255,bg=colour39]#W '
setw -g window-status-activity-style fg=colour223,bg=colour235,bold
setw -g window-status-bell-style fg=colour235,bg=colour203,bold
set -g message-style fg=colour255,bg=colour24,bold
set -g message-command-style fg=colour255,bg=colour24,bold
set -g mode-style fg=colour235,bg=colour186,bold

# Make the active pane easier to identify.
set -g pane-border-lines double
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour39
set -g pane-border-status top
set -g pane-border-format ' #[bold]#T #[default]'
set -g display-panes-active-colour colour39
set -g display-panes-colour colour244
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_command}'
set -g set-titles on
set -g set-titles-string '#S:#I.#P #{pane_current_command}'

# Alternative: Control + Shift + Arrows
bind -n C-S-Left  resize-pane -L 5
bind -n C-S-Right resize-pane -R 5
bind -n C-S-Up    resize-pane -U 5
bind -n C-S-Down  resize-pane -D 5

# tmux plugin manager
set -g @plugin 'tmux-plugins/tpm'
run '~/.tmux/plugins/tpm/tpm'
